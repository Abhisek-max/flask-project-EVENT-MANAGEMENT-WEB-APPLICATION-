<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
    <link rel="stylesheet"
      href="{{ url_for('static',
      filename='css/change_password.css') }}">
</head>
<body>

<div class="password-container">

    <h2>Change Password</h2>

    {% if message %}
        <p class="message">{{ message }}</p>
    {% endif %}

    <form method="POST">

        <input type="password"
               name="current_password"
               placeholder="Current Password"
               required>

        <input type="password"
               name="new_password"
               placeholder="New Password"
               required>

        <input type="password"
               name="confirm_password"
               placeholder="Confirm New Password"
               required>

        <button type="submit">
            Update Password
        </button>

    </form>

    <a href="/profile" class="back-link">
        ← Back to Profile
    </a>

</div>

</body>
</html>
